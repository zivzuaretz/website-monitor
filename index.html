<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>מעקב שינויים – אתרי חברות ביטוח והשקעות</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    header p.subtitle {
      color: #888;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .refresh-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      background: #1e2130;
      border: 1px solid #2a2f45;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 0.88rem;
      color: #a0a8c0;
    }

    .refresh-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #1a1d2e;
      border: 1px solid #252840;
      border-radius: 12px;
      padding: 18px 32px;
      text-align: center;
      min-width: 140px;
    }

    .stat-card .num {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: #666;
      margin-top: 4px;
    }

    .stat-card.changed .num { color: #f87171; }
    .stat-card.ok .num { color: #4ade80; }

    .companies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .company-card {
      background: #1a1d2e;
      border: 1px solid #252840;
      border-radius: 16px;
      overflow: hidden;
    }

    .company-header {
      padding: 16px 20px;
      background: #20243a;
      border-bottom: 1px solid #252840;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .company-name {
      font-weight: 700;
      font-size: 1rem;
      color: #c8d0f0;
    }

    .company-count {
      font-size: 0.75rem;
      color: #555;
      background: #2a2f4a;
      border-radius: 999px;
      padding: 2px 10px;
    }

    .site-list {
      list-style: none;
      padding: 8px 0;
    }

    .site-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid #1e2235;
      gap: 12px;
    }

    .site-item:last-child { border-bottom: none; }

    .site-label {
      font-size: 0.88rem;
      color: #cdd0e0;
      flex: 1;
    }

    .site-label a {
      color: inherit;
      text-decoration: none;
    }

    .site-label a:hover { color: #7b96ff; }

    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 3px 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-ok {
      background: #0d2a1a;
      color: #4ade80;
      border: 1px solid #166534;
    }

    .status-changed {
      background: #2a0d0d;
      color: #f87171;
      border: 1px solid #7f1d1d;
    }

    .status-unknown {
      background: #1e1e1e;
      color: #666;
      border: 1px solid #333;
    }

    .last-change {
      font-size: 0.72rem;
      color: #f87171;
      margin-top: 2px;
    }

    /* Agents leaderboard */
    .section-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #c8d0f0;
      margin: 48px 0 20px;
      letter-spacing: 0.3px;
    }

    .agents-table {
      max-width: 540px;
      margin: 0 auto;
      border-collapse: collapse;
      width: 100%;
    }

    .agents-table th {
      background: #20243a;
      color: #888;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 10px 20px;
      text-align: right;
      border-bottom: 1px solid #252840;
    }

    .agents-table td {
      padding: 14px 20px;
      border-bottom: 1px solid #1e2235;
      font-size: 0.9rem;
      background: #1a1d2e;
    }

    .agents-table tr:last-child td { border-bottom: none; }

    .agents-table .rank {
      color: #555;
      font-size: 0.8rem;
      width: 32px;
    }

    .agents-table .agent-name {
      color: #e0e4ff;
      font-weight: 600;
    }

    .agents-table .points-cell {
      text-align: center;
    }

    .points-pill {
      display: inline-block;
      background: #1a2a4a;
      color: #7b96ff;
      border: 1px solid #2a3f7a;
      border-radius: 999px;
      padding: 4px 16px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .agents-wrapper {
      background: #1a1d2e;
      border: 1px solid #252840;
      border-radius: 16px;
      overflow: hidden;
      max-width: 540px;
      margin: 0 auto;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      color: #333;
      font-size: 0.78rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .companies-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 12px; }
      .stat-card { padding: 14px 20px; min-width: 110px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📡 מעקב שינויים – אתרי חברות</h1>
  <p class="subtitle">מעקב אוטומטי אחר עדכונים בדפי חברות ביטוח והשקעות</p>
  <div class="refresh-badge">
    <span class="dot"></span>
    <span>תאריך רענון נתונים: <strong id="refresh-label">טוען...</strong></span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="num" id="total-count">—</div>
    <div class="label">דפים במעקב</div>
  </div>
  <div class="stat-card changed">
    <div class="num" id="changed-count">—</div>
    <div class="label">שינויים שזוהו</div>
  </div>
  <div class="stat-card ok">
    <div class="num" id="ok-count">—</div>
    <div class="label">ללא שינוי</div>
  </div>
</div>

<div class="companies-grid" id="companies-grid"></div>

<div id="agents-section" style="display:none">
  <div class="section-title">🏆 טבלת נקודות סוכנים</div>
  <div class="agents-wrapper">
    <table class="agents-table">
      <thead>
        <tr>
          <th>#</th>
          <th>שם סוכן</th>
          <th style="text-align:center">נקודות</th>
        </tr>
      </thead>
      <tbody id="agents-tbody"></tbody>
    </table>
  </div>
</div>

<footer>גישה לדף זה מותרת לבעלי הקישור בלבד &nbsp;·&nbsp; אין להפיץ</footer>

<script>
  async function loadData() {
    const res = await fetch('data.json?v=' + Date.now());
    return res.json();
  }

  function formatDate(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Asia/Jerusalem',
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).formatToParts(d);
    const get = type => parts.find(p => p.type === type)?.value ?? '';
    return `${get('day')}/${get('month')}/${get('year')} ${get('hour')}:${get('minute')}:${get('second')}`;
  }

  function statusBadge(status) {
    if (!status || status === 'ללא שינוי') {
      return `<span class="status-badge status-ok">ללא שינוי</span>`;
    }
    if (status === 'שינוי זוהה') {
      return `<span class="status-badge status-changed">שינוי זוהה !</span>`;
    }
    return `<span class="status-badge status-unknown">${status}</span>`;
  }

  async function render() {
    const data = await loadData();

    // Refresh date
    document.getElementById('refresh-label').textContent = formatDate(data.refresh_date) || '—';

    // Stats
    const total = data.sites.length;
    const changed = data.sites.filter(s => s.status === 'שינוי זוהה').length;
    const ok = data.sites.filter(s => !s.status || s.status === 'ללא שינוי').length;
    document.getElementById('total-count').textContent = total;
    document.getElementById('changed-count').textContent = changed;
    document.getElementById('ok-count').textContent = ok;

    // Group by company
    const grouped = {};
    for (const site of data.sites) {
      if (!grouped[site.company]) grouped[site.company] = [];
      grouped[site.company].push(site);
    }

    const grid = document.getElementById('companies-grid');
    grid.innerHTML = '';

    for (const [company, sites] of Object.entries(grouped)) {
      const card = document.createElement('div');
      card.className = 'company-card';

      const items = sites.map(s => `
        <li class="site-item">
          <div class="site-label">
            <a href="${s.url}" target="_blank" rel="noopener">${s.label}</a>
            ${s.last_change ? `<div class="last-change">שינוי אחרון: ${formatDate(s.last_change)}</div>` : ''}
          </div>
          ${statusBadge(s.status)}
        </li>
      `).join('');

      card.innerHTML = `
        <div class="company-header">
          <span class="company-name">${company}</span>
          <span class="company-count">${sites.length} דפים</span>
        </div>
        <ul class="site-list">${items}</ul>
      `;
      grid.appendChild(card);
    }

    // Agents leaderboard
    if (data.agents && data.agents.length) {
      const sorted = [...data.agents].sort((a, b) => b.points - a.points);
      const tbody = document.getElementById('agents-tbody');
      tbody.innerHTML = sorted.map((a, i) => `
        <tr>
          <td class="rank">${i + 1}</td>
          <td class="agent-name">${a.name}</td>
          <td class="points-cell"><span class="points-pill">${a.points} נק׳</span></td>
        </tr>
      `).join('');
      document.getElementById('agents-section').style.display = 'block';
    }
  }

  render().catch(err => {
    document.getElementById('refresh-label').textContent = 'שגיאה בטעינת נתונים';
    console.error(err);
  });
</script>
</body>
</html>
